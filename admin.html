<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rhyah Restaurant — Admin</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="topbar noPrint">
        <div class="brand">
          <h1 id="restaurantName">Rhyah Restaurant</h1>
          <div class="sub">Manage menu & settings (local device)</div>
        </div>
        <nav class="nav">
          <a class="btn" href="./menu.html">Menu</a>
          <a class="btn" href="./cart.html">Cart</a>
          <a class="btn" href="./report.html">Monthly Report</a>
        </nav>
      </header>

      <main class="grid" style="margin-top:18px">
        <section class="card">
          <div class="card-h">
            <h2>Menu items</h2>
            <div class="chip"><span class="muted">CRUD</span></div>
          </div>
          <div class="card-b">
            <form id="itemForm" class="row" style="align-items:flex-end">
              <input type="hidden" id="itemId" />
              <div class="grow" style="min-width:220px">
                <div class="muted" style="font-size:12px;margin:0 0 6px">Name</div>
                <input id="name" class="input" placeholder="e.g., Dosa" required />
              </div>
              <div style="width:160px">
                <div class="muted" style="font-size:12px;margin:0 0 6px">Price (INR)</div>
                <input id="price" class="input" type="number" min="0" step="0.01" placeholder="0" required />
              </div>
              <div style="min-width:220px">
                <div class="muted" style="font-size:12px;margin:0 0 6px">Image (optional)</div>
                <input id="image" class="input" type="file" accept="image/*" />
              </div>
              <label class="chip" style="cursor:pointer;user-select:none">
                <input id="isAvailable" type="checkbox" checked />
                <span>Available</span>
              </label>
              <button id="saveBtn" class="btn primary" type="submit">Save</button>
              <button id="resetBtn" class="btn" type="button">Reset</button>
            </form>

            <div id="adminMsg" class="muted" style="margin-top:10px"></div>

            <div style="margin-top:14px" class="row">
              <input id="filter" class="input" placeholder="Filter items..." style="max-width:320px" />
            </div>

            <div id="itemsList" style="margin-top:10px"></div>
          </div>
        </section>

        <aside class="card">
          <div class="card-h">
            <h2>Settings</h2>
          </div>
          <div class="card-b">
            <div style="margin-bottom:12px">
              <div class="muted" style="font-size:12px;margin:0 0 6px">Restaurant name</div>
              <input id="settingRestaurantName" class="input" />
            </div>
            <div style="margin-bottom:12px">
              <div class="muted" style="font-size:12px;margin:0 0 6px">Tax rate (%)</div>
              <input id="settingTaxRate" class="input" type="number" min="0" step="0.01" />
            </div>
            <div style="margin-bottom:12px">
              <div class="muted" style="font-size:12px;margin:0 0 6px">UPI QR image</div>
              <input id="settingQrFile" class="input" type="file" accept="image/*" />
              <div class="muted" style="font-size:12px;margin-top:8px">Preview:</div>
              <img id="settingQrPreview" alt="UPI QR preview" style="width:100%;max-width:320px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.03);margin-top:6px" />
            </div>
            <div class="row">
              <button id="saveSettingsBtn" class="btn ok" type="button">Save settings</button>
            </div>
            <div id="settingsMsg" class="muted" style="margin-top:10px"></div>
          </div>
        </aside>
      </main>
    </div>

    <script type="module" src="./ui-admin.js"></script>
  </body>
</html>
