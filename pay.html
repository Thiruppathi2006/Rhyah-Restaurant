<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rhyah Restaurant — Pay</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="topbar noPrint">
        <div class="brand">
          <h1 id="restaurantName">Rhyah Restaurant</h1>
          <div class="sub">Pay now (UPI QR)</div>
        </div>
        <nav class="nav">
          <a class="btn" href="./index.html">Menu</a>
          <a class="btn" href="./cart.html">Cart</a>
          <a class="btn" href="./admin.html">Manage Menu</a>
        </nav>
      </header>

      <main class="grid">
        <section class="card">
          <div class="card-h">
            <h2>Order</h2>
            <div class="chip"><strong id="orderId">—</strong></div>
          </div>
          <div class="card-b">
            <div id="orderItems"></div>
            <div class="totals">
              <div class="trow"><span class="muted">Subtotal</span><span id="subtotal">₹0.00</span></div>
              <div class="trow"><span class="muted">Tax</span><span id="tax">₹0.00</span></div>
              <div class="trow grand"><span>Total</span><span id="total">₹0.00</span></div>
            </div>

            <div class="row noPrint" style="margin-top:14px">
              <button id="markPaidBtn" class="btn ok" type="button">Mark paid</button>
              <button id="printBtn" class="btn" type="button">Print bill</button>
              <a id="backBtn" class="btn primary" href="./index.html" style="margin-left:auto">Done</a>
            </div>

            <div id="statusMsg" class="muted" style="margin-top:10px"></div>
          </div>
        </section>

        <aside class="card">
          <div class="card-h">
            <h2>UPI QR</h2>
            <div class="chip"><span class="muted">Static QR</span></div>
          </div>
          <div class="card-b">
            <img id="qrImg" alt="UPI QR" style="width:100%;max-width:360px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.03)" />
            <div id="qrHint" class="muted" style="margin-top:10px;font-size:12px"></div>
          </div>
        </aside>
      </main>

      <div class="printWrap" style="margin-top:16px">
        <div id="receipt" class="receipt" style="display:none"></div>
      </div>
    </div>

    <script type="module" src="./ui-pay.js"></script>
  </body>
</html>
